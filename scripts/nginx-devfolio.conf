# /etc/nginx/sites-available/devfolio.uz
# Nginx reverse proxy config for devfolio.uz

server {
    listen 80;
    server_name devfolio.uz www.devfolio.uz;
    # Certbot bu yerga HTTPS redirect qo'shadi
}

server {
    listen 80;
    server_name api.devfolio.uz;
    # Certbot bu yerga HTTPS redirect qo'shadi
}

